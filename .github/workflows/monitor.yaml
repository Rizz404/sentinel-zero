name: Sentinel-Zero Monitor

on:
  schedule:
    # Berjalan setiap 4 jam
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write # Izin krusial biar nggak kena error 403 lagi!

jobs:
  monitor-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Random Jitter & Probabilistic Run
        # Kita tambahkan logika: 20% kemungkinan workflow ini 'skip' biar commit gak terlalu kaku
        run: |
          CHANCE=$(( RANDOM % 100 ))
          if [ $CHANCE -lt 20 ]; then
            echo "Skipping this run for more 'natural' activity."
            exit 0
          fi

          DELAY=$(( (RANDOM % 90) + 1 ))
          echo "Waiting for $DELAY minutes..."
          sleep ${DELAY}m

      - name: Run Sentinel
        run: npx ts-node index.ts

      - name: Commit Log
        run: |
          git config --global user.name "Rizz404"
          git config --global user.email "109719910+Rizz404@users.noreply.github.com"
          git add health-report.md
          git commit -m "logs: system health update [$(date +'%Y-%m-%d %H:%M')]" || echo "No changes"
          git push
